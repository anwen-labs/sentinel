# Render Blueprint — deploys the Sentinel web demo as a FREE static site.
#
# The engine runs entirely client-side in WebAssembly; there is no backend and
# no data ever leaves the visitor's browser. Render only hosts static files.
#
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo.
# The build installs Rust + wasm-pack and compiles the WASM bundle.

services:
  - name: sentinel-web
    type: web
    runtime: static
    buildCommand: >-
      curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --target wasm32-unknown-unknown &&
      . "$HOME/.cargo/env" &&
      curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh &&
      wasm-pack build crates/web --target web --out-dir site/pkg --release
    staticPublishPath: ./crates/web/site
    routes:
      - source: /*
        destination: /index.html
    headers:
      - path: /*
        headers:
          - key: X-Content-Type-Options
            value: nosniff
          - key: Referrer-Policy
            value: no-referrer
