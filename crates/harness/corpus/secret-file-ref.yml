# A hardened service that references a secret via the *_FILE pattern (the
# recommended Docker secrets approach). It must NOT be flagged as an inline
# secret. Regression test for the *_FILE false positive.
services:
  app:
    image: nginx@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    user: "10001"
    read_only: true
    environment:
      DB_PASSWORD_FILE: /run/secrets/db-password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db-password
