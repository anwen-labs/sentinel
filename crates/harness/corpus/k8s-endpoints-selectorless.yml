# A selectorless Service (no spec.selector) wired to a bare privileged Pod via
# manual Endpoints; an external LoadBalancer reaches it -> node-compromise chain.
# EXPECT: Critical K8S-PRIVILEGED-CONTAINER
# EXPECT: Critical K8S-REACHABLE-NODE-COMPROMISE
apiVersion: v1
kind: Service
metadata: { name: web, namespace: prod }
spec:
  type: LoadBalancer
  ports: [{ port: 80 }]
---
apiVersion: v1
kind: Endpoints
metadata: { name: web, namespace: prod }
subsets:
  - addresses:
      - ip: 10.0.0.5
        targetRef: { kind: Pod, name: web }
---
apiVersion: v1
kind: Pod
metadata: { name: web, namespace: prod }
spec:
  containers:
    - name: app
      image: nginx@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      securityContext: { privileged: true, runAsNonRoot: true, allowPrivilegeEscalation: false }
