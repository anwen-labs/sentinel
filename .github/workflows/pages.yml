name: deploy-web

# Builds the WASM bundle and publishes the static site to GitHub Pages.
# The page runs the engine client-side; this only hosts static files.

on:
  push:
    branches: [main]
    paths:
      - "crates/web/**"
      - "crates/fact-model/**"
      - "crates/engine/**"
      - "crates/compose-parser/**"
      - "crates/pack-sentinel-core/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM bundle
        run: wasm-pack build crates/web --target web --out-dir site/pkg --release
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/web/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
