name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace --verbose
      - name: Unit tests
        run: cargo test --workspace --verbose
      - name: Eval harness (gate)
        run: cargo run -p harness
