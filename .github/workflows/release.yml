name: release

# On a version tag (e.g. v0.1.0), cross-compile the `sentinel` binary for each
# target and attach archives + SHA-256 checksums to the GitHub Release. The CI
# Action and local installers download these prebuilt binaries.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build & upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: sentinel
          target: ${{ matrix.target }}
          archive: sentinel-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
